name: Integration Tests (Staging)

# Runs E2E Playwright tests against the Dominion staging realm.
# The staging realm must already be deployed — this workflow only runs tests.
# Extensions opt in by having tests/e2e/ with playwright.config.ts and package.json.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      extension:
        description: 'Test a single extension (leave empty for all enabled)'
        required: false
        type: string

env:
  DOMINION_FRONTEND_URL: https://gzya5-jyaaa-aaaac-qai5a-cai.icp0.io

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout extensions repo
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run E2E tests
      env:
        PLAYWRIGHT_BASE_URL: ${{ env.DOMINION_FRONTEND_URL }}
      run: |
        set -e
        FAILED=0

        # Discover extensions with E2E tests
        if [ -n "${{ github.event.inputs.extension }}" ]; then
          EXTENSIONS="${{ github.event.inputs.extension }}"
        else
          # Auto-discover: extensions with tests/e2e/.staging-e2e marker
          EXTENSIONS=$(find extensions -path "*/tests/e2e/.staging-e2e" \
            ! -path "*/_shared/*" \
            -exec dirname {} \; \
            | xargs -I{} dirname {} \
            | xargs -I{} dirname {} \
            | xargs -I{} basename {} \
            | sort -u)
        fi

        for ext in $EXTENSIONS; do
          E2E_DIR="extensions/$ext/tests/e2e"
          if [ ! -f "$E2E_DIR/playwright.config.ts" ]; then
            continue
          fi

          echo "━━━ $ext ━━━"
          cd "$E2E_DIR"
          npm install
          npx playwright install chromium --with-deps
          if npx playwright test; then
            echo "  ✅ $ext passed"
          else
            echo "  ❌ $ext failed"
            FAILED=$((FAILED + 1))
          fi
          cd "$GITHUB_WORKSPACE"
        done

        if [ "$FAILED" -gt 0 ]; then
          echo "❌ $FAILED extension(s) failed E2E tests"
          exit 1
        fi
        echo "✅ All E2E tests passed"

    - name: Upload E2E results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: |
          extensions/*/tests/e2e/test-results/
          extensions/*/tests/e2e/playwright-report/
        retention-days: 14
        if-no-files-found: warn
