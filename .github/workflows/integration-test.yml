name: Integration Tests (Staging)

# Runs E2E Playwright tests for all extensions against the Dominion staging realm.
# The staging realm must already be deployed — this workflow only runs tests.
# Use testing/setup_staging_realm.sh locally to deploy before running CI.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      extension:
        description: 'Test a single extension (leave empty for all)'
        required: false
        type: string

env:
  DFX_WARNING: -mainnet_plaintext_identity
  DOMINION_FRONTEND_URL: https://gzya5-jyaaa-aaaac-qai5a-cai.icp0.io
  DOMINION_BACKEND_ID: h5vpp-qyaaa-aaaac-qai3a-cai

jobs:
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout extensions repo
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright
      run: |
        cd extensions/_shared/testing/e2e
        npm install
        npx playwright install chromium --with-deps

    - name: Install per-extension E2E dependencies
      run: |
        EXTENSION="${{ github.event.inputs.extension }}"
        if [ -n "$EXTENSION" ]; then
          DIRS="extensions/$EXTENSION/tests/e2e"
        else
          DIRS=$(find extensions -path "*/tests/e2e" -type d ! -path "*/_shared/*")
        fi

        for dir in $DIRS; do
          if [ -f "$dir/package.json" ]; then
            echo "Installing dependencies for $dir..."
            cd "$dir"
            npm install
            cd "$GITHUB_WORKSPACE"
          fi
        done

    - name: Run E2E tests
      env:
        PLAYWRIGHT_BASE_URL: ${{ env.DOMINION_FRONTEND_URL }}
      run: |
        EXTENSION="${{ github.event.inputs.extension }}"
        if [ -n "$EXTENSION" ]; then
          bash testing/run_all_tests.sh --e2e-only --extension "$EXTENSION"
        else
          bash testing/run_all_tests.sh --e2e-only
        fi

    - name: Upload E2E results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: |
          extensions/*/tests/e2e/test-results/
          extensions/*/tests/e2e/playwright-report/
        retention-days: 14
        if-no-files-found: warn

    - name: Upload E2E screenshots
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-screenshots
        path: extensions/*/tests/e2e/test-results/**/*.png
        retention-days: 7
        if-no-files-found: warn
