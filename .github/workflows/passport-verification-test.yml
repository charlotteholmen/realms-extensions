name: Passport Verification Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'extensions/passport_verification/**'
      - 'extensions/_shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'extensions/passport_verification/**'
      - 'extensions/_shared/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run tests
        working-directory: extensions/passport_verification
        run: bash run_tests.sh

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: passport-verification-test-logs
          path: extensions/passport_verification/test-logs/
          retention-days: 14

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: passport-verification-e2e-results
          path: |
            extensions/passport_verification/tests/e2e/test-results/
            extensions/passport_verification/tests/e2e/playwright-report/
          retention-days: 14
