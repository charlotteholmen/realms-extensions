name: Passport Verification Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'extensions/passport_verification/**'
      - 'extensions/_shared/**'
      - '.github/workflows/passport_verification-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'extensions/passport_verification/**'
      - 'extensions/_shared/**'
      - '.github/workflows/passport_verification-test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8
        
    - name: Install extension dependencies
      run: |
        cd extensions/passport_verification
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        
    - name: Run linters
      run: |
        cd extensions/passport_verification
        if [ -d backend ]; then
          echo "Running black..."
          black backend --check || echo "⚠️  Black check failed or no Python files found"
          echo "Running isort..."
          isort backend --check-only || echo "⚠️  isort check failed or no Python files found"
          echo "Running flake8..."
          flake8 backend || echo "⚠️  flake8 check failed or no Python files found"
        fi
        
    - name: Run backend tests
      run: |
        cd extensions/passport_verification
        if [ -f run_tests.sh ]; then
          bash run_tests.sh
        else
          echo "ℹ️  No run_tests.sh found - skipping local backend tests"
          echo "ℹ️  Full integration tests run via integration-test.yml workflow"
        fi

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install E2E dependencies
      run: |
        if [ -d extensions/passport_verification/tests/e2e ]; then
          cd extensions/passport_verification/tests/e2e
          npm install
          npx playwright install chromium --with-deps
        fi

    - name: Run E2E tests (against staging)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        PLAYWRIGHT_BASE_URL: https://gzya5-jyaaa-aaaac-qai5a-cai.icp0.io
      run: |
        if [ -d extensions/passport_verification/tests/e2e ]; then
          cd extensions/passport_verification/tests/e2e
          npx playwright test || echo "⚠️  E2E tests failed (staging may not be deployed)"
        fi

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: passport-verification-test-logs
        path: extensions/passport_verification/test-logs/
        retention-days: 14
        if-no-files-found: warn

    - name: Upload E2E results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: passport-verification-e2e-results
        path: |
          extensions/passport_verification/tests/e2e/test-results/
          extensions/passport_verification/tests/e2e/playwright-report/
        retention-days: 14
        if-no-files-found: warn
